name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run verify
      - name: Run live production suite
        env:
          COMMENTARY_LIVE_BASE_URL: https://commentary.dev
          COMMENTARY_LIVE_TOKEN: ${{ secrets.COMMENTARY_LIVE_TOKEN }}
        run: npm run test:live
      - name: Publish when version changed
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          node scripts/publish-if-needed.mjs
